name: Restock watch manual

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  REQUEST_INTERVAL_SEC: "1.0"
  REQUEST_TIMEOUT_SEC: "25"
  ENOKING_MAX_CRAWL_PAGES: "80"
  RESPECT_ROBOTS: "true"

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run low-frequency manual watch
        run: python src/monitor.py
      - name: Upload latest snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restock-watch-${{ github.run_number }}
          path: |
            output/*.csv
            output/*.json
            output/*.xlsx
          retention-days: 7
          if-no-files-found: warn
