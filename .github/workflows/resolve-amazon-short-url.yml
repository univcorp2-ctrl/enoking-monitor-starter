name: Resolve Amazon short URL

on:
  push:
    paths:
      - '.github/workflows/resolve-amazon-short-url.yml'

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve URL and page title
        shell: bash
        run: |
          set -euo pipefail
          SHORT_URL='https://amzn.asia/d/0eXaJIzL'
          FINAL_URL="$(curl -Lso /dev/null -w '%{url_effective}' -A 'Mozilla/5.0' "$SHORT_URL")"
          HTML="$(curl -Ls -A 'Mozilla/5.0' "$FINAL_URL" | head -c 200000 || true)"
          TITLE="$(printf '%s' "$HTML" | tr '\n' ' ' | sed -n 's:.*<title[^>]*>\([^<]*\)</title>.*:\1:p' | head -1)"
          ASIN="$(printf '%s' "$FINAL_URL" | sed -n 's#.*\/dp\/\([A-Z0-9]\{10\}\).*#\1#p')"
          {
            echo "FINAL_URL=$FINAL_URL"
            echo "ASIN=$ASIN"
            echo "TITLE=$TITLE"
          } > .tmp-amazon-result.txt
      - name: Commit result
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .tmp-amazon-result.txt
          git commit -m 'chore: record temporary Amazon URL resolution'
          git push
