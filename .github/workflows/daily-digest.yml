name: Daily Telegram digest

on:
  workflow_dispatch:
  schedule:
    # 09:00 JST every day. Uses the same safe cloud pipeline and prints summary.
    - cron: "0 0 * * *"

permissions:
  contents: read

env:
  REQUEST_INTERVAL_SEC: "1.0"
  REQUEST_TIMEOUT_SEC: "25"
  ENOKING_MAX_CRAWL_PAGES: "220"
  RESPECT_ROBOTS: "true"

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run cloud pipeline summary
        env:
          RAKUTEN_APPLICATION_ID: ${{ secrets.RAKUTEN_APPLICATION_ID }}
        run: python -m src.run_cloud_pipeline
      - name: Upload digest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-digest-${{ github.run_number }}
          path: |
            output/*.csv
            output/*.json
            output/*.xlsx
          retention-days: 30
          if-no-files-found: warn
