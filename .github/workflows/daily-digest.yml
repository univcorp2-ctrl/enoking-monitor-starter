name: Daily Telegram digest

# 毎日必ず1通、Telegramに転売ダイジェストを配信する（買い候補ゼロの日も価格差ランキングを送る）。
# PCの電源状態に依存しないクラウド実行。

on:
  workflow_dispatch:
  schedule:
    # 09:00 JST every day (00:00 UTC)
    - cron: "0 0 * * *"

permissions:
  contents: read

env:
  BUY_MARGIN_THRESHOLD_YEN: "2000"
  REQUEST_INTERVAL_SEC: "1.0"
  REQUEST_TIMEOUT_SEC: "15"
  DIGEST_TOP_N: "8"

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send daily digest to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/daily_digest.py
