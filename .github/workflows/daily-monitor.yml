name: Supplier monitor

on:
  workflow_dispatch:
  schedule:
    # Every 30 minutes (near real-time). Adjust the interval to balance
    # detection speed against GitHub Actions minutes.
    - cron: "*/30 * * * *"

permissions:
  contents: read

# Avoid overlapping runs when a check takes longer than the interval.
concurrency:
  group: supplier-monitor
  cancel-in-progress: false

env:
  BUY_MARGIN_THRESHOLD_YEN: "2000"

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

      # Carries the notification de-dup state across runs so the same buy
      # candidate is not re-announced every interval.
      - name: Restore notify state
        uses: actions/cache@v4
        with:
          path: output/notify_state.json
          key: notify-state-${{ github.run_id }}
          restore-keys: |
            notify-state-

      - name: Run monitor
        env:
          # Secrets override these defaults when registered.
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID || '1060459429146863364' }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          YAHOO_APP_ID: ${{ secrets.YAHOO_APP_ID || 'dj00aiZpPWhhNVV4Y3NzdHlrViZzPWNvbnN1bWVyc2VjcmV0Jng9YjQ-' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python src/monitor.py

      - name: Upload result CSV
        uses: actions/upload-artifact@v4
        with:
          name: monitor-results-${{ github.run_id }}
          path: output/*.csv
          retention-days: 7
