name: Daily supplier monitor

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "config/**"
      - ".github/workflows/daily-monitor.yml"
      - "requirements*.txt"
  schedule:
    # 09:30 JST every day
    - cron: "30 0 * * *"

permissions:
  contents: read

env:
  BUY_MARGIN_THRESHOLD_YEN: "2000"
  REQUEST_INTERVAL_SEC: "2.0"
  REQUEST_TIMEOUT_SEC: "20"

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

      - name: Run production monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RAKUTEN_APPLICATION_ID: ${{ secrets.RAKUTEN_APPLICATION_ID }}
          YAHOO_CLIENT_ID: ${{ secrets.YAHOO_CLIENT_ID }}
        run: python src/monitor.py

      - name: Upload monitor artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-results-${{ github.run_number }}
          path: |
            output/*.csv
            output/*.xlsx
          retention-days: 30
          if-no-files-found: warn
