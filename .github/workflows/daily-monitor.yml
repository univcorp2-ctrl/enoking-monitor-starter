name: Daily supplier monitor

on:
  workflow_dispatch:
  schedule:
    # 09:30 JST every day. Main public site deployment is handled by enoking-cloud-site.yml.
    - cron: "30 0 * * *"

permissions:
  contents: read

env:
  REQUEST_INTERVAL_SEC: "1.0"
  REQUEST_TIMEOUT_SEC: "25"
  ENOKING_MAX_CRAWL_PAGES: "220"
  RESPECT_ROBOTS: "true"

concurrency:
  group: daily-supplier-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -q
      - name: Run monitor pipeline
        env:
          RAKUTEN_APPLICATION_ID: ${{ secrets.RAKUTEN_APPLICATION_ID }}
        run: python src/monitor.py
      - name: Upload monitor artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-results-${{ github.run_number }}
          path: |
            output/*.csv
            output/*.json
            output/*.xlsx
          retention-days: 30
          if-no-files-found: warn
